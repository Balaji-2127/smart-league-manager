version: "3"

services:

  backend:
    build: ./server
    container_name: smart-league-backend
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
